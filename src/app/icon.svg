<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="#faf8f4"/>

  <!-- Checkbox square — hand-drawn style with slight irregularity -->
  <rect x="192" y="192" width="640" height="640" rx="48"
        fill="none" stroke="#2c2a25" stroke-width="56"
